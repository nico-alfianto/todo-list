<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diary To Do</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Caveat:wght@700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
body { background: linear-gradient(135deg, #fde68a 0%, #fecaca 100%); min-height: 100vh; padding: 20px; display: flex; justify-content: center; align-items: center; }

.login-box { background: #fffdf5; width: 100%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 2px solid #f3e8ff; }

.book { width: 100%; max-width: 750px; }
.navbar { display: flex; justify-content: space-between; align-items: center; background: #fffdf5; padding: 15px 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border: 2px solid #f3e8ff; }
.nav-left { display: flex; gap: 10px; }
.nav-btn { padding: 10px 18px; border: none; background: #dbeafe; color: #1e40af; border-radius: 14px; font-weight: 900; cursor: pointer; font-size: 14px; transition: 0.15s; }
.nav-btn.active { background: #3b82f6; color: white; }
.nav-btn:active { transform: scale(0.95); }

.nav-right { display: flex; gap: 10px; align-items: center; }
.btn-logout { padding: 8px 14px; border: none; background: #fca5a5; color: white; border-radius: 12px; font-weight: 700; cursor: pointer; }

.page { background: #fffdf5; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 2px solid #f3e8ff; background-image:
  linear-gradient(#e0e7ff 1px, transparent 1px);
  background-size: 100% 32px;
  min-height: 550px; display: none; }
.page.active { display: block; }
.page-title { font-family: 'Caveat', cursive; font-size: 26px; color: #3b82f6; text-align: center; margin-bottom: 20px; border-bottom: 3px dashed #bfdbfe; padding-bottom: 10px; }

/* FORM */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-grid-full { grid-column: span 2; }
label { font-size: 12px; color: #3b82f6; font-weight: 700; margin-bottom: 4px; display: block; }

/* UPLOAD FILE */
.file-upload { border: 2px dashed #bfdbfe; border-radius: 12px; padding: 10px; text-align: center; cursor: pointer; background: #eff6ff; }
.file-upload:hover { background: #dbeafe; }
.file-preview { font-size: 12px; color: #1e40af; margin-top: 5px; }

/* DETAIL TUGAS */
.detail-card { background: rgba(239, 246, 255, 0.7); padding: 20px; border-radius: 16px; border-left: 5px solid #3b82f6; margin-bottom: 15px; }
.detail-title { font-size: 18px; font-weight: 900; color: #1e3a8a; margin-bottom: 10px; }
.detail-info { margin: 8px 0; font-size: 14px; }
.notif-setting { background: #fef3c7; padding: 15px; border-radius: 12px; margin-top: 15px; }
.btn-notif { background: #f59e0b; color: white; border: none; padding: 10px 16px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-right: 8px; }
.btn-edit { background: #60a5fa; color: white; border: none; padding: 10px 16px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-right: 8px; }
.btn-delete { background: #ef4444; color: white; border: none; padding: 10px 16px; border-radius: 12px; font-weight: 700; cursor: pointer; }
.btn-back { background: #94a3b8; color: white; border: none; padding: 10px 16px; border-radius: 12px; font-weight: 700; cursor: pointer; }

/* TASK LIST */
.task { background: rgba(239, 246, 255, 0.7); padding: 14px; margin-bottom: 12px; border-radius: 12px; border-left: 4px solid #60a5fa; cursor: pointer; transition: 0.2s; }
.task:hover { transform: translateX(5px); }
.task.completed { background: rgba(240, 253, 244, 0.7); border-left-color: #4ade80; }
.task.overdue { background: rgba(254, 226, 226, 0.7); border-left-color: #ef4444; }
.task.inprogress { background: rgba(254, 243, 199, 0.7); border-left-color: #f59e0b; }

.btn-add { background: #60a5fa; color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 900; cursor: pointer; font-size: 16px; transition: all 0.12s ease; box-shadow: 0 5px 0 #2563eb; width: 100%; margin-top: 25px; }
.btn-add:active { transform: translateY(5px); box-shadow: 0 0 0 #2563eb; background: #2563eb; }
.btn-save { background: #4ade80; box-shadow: 0 5px 0 #16a34a; }
.btn-save:active { box-shadow: 0 0 0 #16a34a; }

input, textarea, select { padding: 12px; border: 2px solid #dbeafe; border-radius: 12px; font-size: 14px; background: white; width: 100%; margin-bottom: 10px; }

.category-badge { padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 900; margin-left: 8px; }
.status-badge { padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 900; margin-left: 5px; }
.status-done { background: #dcfce7; color: #166534; }
.status-progress { background: #fef3c7; color: #d97706; }
.status-overdue { background: #fee2e2; color: #b91c1c; }

.cat-harian { background: #fef3c7; color: #d97706; }
.cat-sekolah { background: #dbeafe; color: #1e40af; }
.cat-kuliah { background: #e0e7ff; color: #4338ca; }
.cat-kerja { background: #fee2e2; color: #b91c1c; }
.cat-pribadi { background: #dcfce7; color: #166534; }

.file-link { color: #3b82f6; text-decoration: underline; font-size: 12px; }

.message-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: #fffdf5; padding: 25px; border-radius: 20px; border: 4px solid #93c5fd; text-align: center; z-index: 999; transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
.message-box.show { transform: translate(-50%, -50%) scale(1); }
.message-text { font-family: 'Caveat', cursive; font-size: 22px; color: #3b82f6; }

@media (max-width: 600px) {
.navbar { flex-direction: column; gap: 10px; }
.nav-left { width: 100%; justify-content: center; }
.nav-right { width: 100%; justify-content: center; }
.form-grid { grid-template-columns: 1fr; }
.form-grid-full { grid-column: span 1; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h2 class="page-title">Buku Diary Ku</h2>
  <input type="text" id="nameInput" placeholder="Nama kamu">
  <input type="date" id="birthInput">
  <button class="btn-add" onclick="login()">Buka Diary</button>
</div>

<!-- BUKU -->
<div class="book" id="mainApp" style="display:none;">
  <!-- NAVBAR BARU -->
  <div class="navbar">
    <div class="nav-left">
      <button class="nav-btn active" onclick="showPage('page-add', this)">Tambah Tugas</button>
      <button class="nav-btn" onclick="showPage('page-detail', this)">Detail Tugas</button>
    </div>
    <div class="nav-right">
      <button class="btn-logout" onclick="logout()">Keluar</button>
    </div>
  </div>

  <!-- HALAMAN 1: TAMBAH TUGAS -->
  <div class="page active" id="page-add">
    <h2 class="page-title">Tambah Tugas Baru</h2>
    <div>
      <input type="text" id="taskInput" placeholder="Judul tugas...">
      <select id="categoryInput">
        <option value="Harian">Harian</option>
        <option value="Sekolah">Sekolah</option>
        <option value="Kuliah">Kuliah</option>
        <option value="Kerja">Kerja</option>
        <option value="Pribadi">Pribadi</option>
      </select>
      <textarea id="noteInput" placeholder="Catatan/deskripsi..." rows="3"></textarea>

      <div class="form-grid">
        <div>
          <label>Mulai</label>
          <input type="date" id="startDateInput">
        </div>
        <div>
          <label>Selesai/Deadline</label>
          <input type="date" id="endDateInput">
        </div>
        <div class="form-grid-full">
          <label>Jam</label>
          <input type="time" id="timeInput">
        </div>
      </div>

      <div class="form-grid-full">
        <label>Tambah File</label>
        <div class="file-upload" onclick="document.getElementById('fileInput').click()">
          📎 Klik untuk upload file
          <input type="file" id="fileInput" style="display:none;" onchange="handleFile(event)">
          <div class="file-preview" id="filePreview"></div>
        </div>
      </div>

      <button class="btn-add" id="btnSave" onclick="addTask()">Simpan Tugas</button>
    </div>

    <h3 style="margin-top:30px; color:#3b82f6;">Daftar Tugas</h3>
    <div id="taskList"></div>
  </div>

  <!-- HALAMAN 2: DETAIL TUGAS -->
  <div class="page" id="page-detail">
    <h2 class="page-title">Detail Tugas</h2>
    <div id="detailContent">
      <p style="text-align:center; color:#94a3b8;">Belum ada tugas yang dipilih</p>
    </div>
  </div>
</div>

<div class="message-box" id="messageBox"><div class="message-text" id="messageText"></div></div>

<script>
let user = JSON.parse(localStorage.getItem('userData')) || null;
let tasks = JSON.parse(localStorage.getItem('tasks_' + (user? user.name:''))) || [];
let currentFile = null;
let selectedTaskIndex = null;
let isEditMode = false;

const saveMessages = ["Tersimpan! Kamu keren", "Dicatat! Jangan lupa dikerjain ya", "Update berhasil!"];

window.onload = function() {
  if(user) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    checkBirthday();
    renderTasks();
    requestNotifPermission();
    // kalau ada tugas, buka detail tugas terakhir
    if(tasks.length > 0) openDetail(tasks.length - 1);
  }
}

function handleFile(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    currentFile = { name: file.name, data: event.target.result };
    document.getElementById('filePreview').innerText = `📎 ${file.name}`;
  }
  reader.readAsDataURL(file);
}

function getTaskStatus(task) {
  const today = new Date().toISOString().split('T')[0];
  if(task.done) return 'done';
  if(task.endDate && task.endDate < today) return 'overdue';
  return 'progress';
}

function login() {
  const name = document.getElementById('nameInput').value.trim();
  const birth = document.getElementById('birthInput').value;
  if(!name ||!birth) return alert('Isi nama dan tanggal lahir dulu ya');
  user = { name, birth };
  localStorage.setItem('userData', JSON.stringify(user));
  location.reload();
}

function logout() {
  if(confirm('Tutup diary?')) {
    localStorage.removeItem('userData');
    location.reload();
  }
}

function requestNotifPermission() {
  if(Notification.permission!== 'granted') {
    Notification.requestPermission();
  }
}

function checkBirthday() {
  const today = new Date();
  const birth = new Date(user.birth);
  if(today.getDate() === birth.getDate() && today.getMonth() === birth.getMonth()) {
    setTimeout(() => showSpecialMessage(`Selamat Ulang Tahun, ${user.name}! 🎉`), 1000);
  }
}

function showSpecialMessage(msg) {
  const box = document.getElementById('messageBox');
  document.getElementById('messageText').innerText = msg;
  box.classList.add('show');
  setTimeout(()=>box.classList.remove('show'), 2000);
}

function showSaveMessage() {
  showSpecialMessage(saveMessages[Math.floor(Math.random() * saveMessages.length)]);
}

function saveTasks() { localStorage.setItem('tasks_' + user.name, JSON.stringify(tasks)); }
function getCategoryClass(cat) { return 'cat-' + cat.toLowerCase(); }

function renderTasks() {
  const taskList = document.getElementById('taskList');
  if(tasks.length === 0) {
    taskList.innerHTML = '<p style="text-align:center; color:#94a3b8;">Belum ada tugas</p>';
    return;
  }
  taskList.innerHTML = tasks.map((task, i) => {
    const status = getTaskStatus(task);
    const statusClass = status === 'done'? 'completed' : status === 'overdue'? 'overdue' : 'inprogress';
    const statusText = status === 'done'? 'Selesai' : status === 'overdue'? 'Terlewat' : 'On Progress';
    const statusBadgeClass = status === 'done'? 'status-done' : status === 'overdue'? 'status-overdue' : 'status-progress';

    return `
      <div class="task ${statusClass}" onclick="openDetail(${i})">
        <b>${task.text}</b>
        <span class="category-badge ${getCategoryClass(task.category)}">${task.category}</span>
        <span class="status-badge ${statusBadgeClass}">${statusText}</span><br>
        <small>📅 ${task.endDate || 'Tanpa deadline'} ${task.time? '⏰ '+task.time : ''}</small>
      </div>
    `;
  }).join('');
}

function openDetail(index) {
  selectedTaskIndex = index;
  const task = tasks[index];
  const status = getTaskStatus(task);
  const statusText = status === 'done'? 'Selesai' : status === 'overdue'? 'Terlewat' : 'On Progress';
  let fileLink = task.file? `<a href="${task.file.data}" download="${task.file.name}" class="file-link">📎 ${task.file.name}</a>` : 'Tidak ada file';

  document.getElementById('detailContent').innerHTML = `
    <button class="btn-back" onclick="showPage('page-add', document.querySelectorAll('.nav-btn')[0])">← Kembali</button>
    <div class="detail-card" style="margin-top:15px;">
      <div class="detail-title">${task.text}</div>
      <div class="detail-info"><b>Kategori:</b> <span class="category-badge ${getCategoryClass(task.category)}">${task.category}</span></div>
      <div class="detail-info"><b>Status:</b> ${statusText}</div>
      <div class="detail-info"><b>Mulai:</b> ${task.startDate || '-'}</div>
      <div class="detail-info"><b>Deadline:</b> ${task.endDate || '-'} ${task.time? '⏰ '+task.time : ''}</div>
      <div class="detail-info"><b>Catatan:</b> ${task.note || '-'}</div>
      <div class="detail-info"><b>File:</b> ${fileLink}</div>
      <div class="detail-info"><input type="checkbox" ${task.done? 'checked':''} onchange="toggleTaskFromDetail(${index})"> Tandai Selesai</div>
    </div>

    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn-edit" onclick="editTask(${index})">✏️ Edit Tugas</button>
      <button class="btn-notif" onclick="setTaskNotif(${index})">🔔 Set Notifikasi</button>
      <button class="btn-delete" onclick="deleteTask(${index})">🗑️ Hapus Tugas</button>
    </div>
  `;

  showPage('page-detail', document.querySelectorAll('.nav-btn')[1]);
}

function editTask(index) {
  isEditMode = true;
  selectedTaskIndex = index;
  const task = tasks[index];

  // isi form
  document.getElementById('taskInput').value = task.text;
  document.getElementById('categoryInput').value = task.category;
  document.getElementById('noteInput').value = task.note;
  document.getElementById('startDateInput').value = task.startDate;
  document.getElementById('endDateInput').value = task.endDate;
  document.getElementById('timeInput').value = task.time;
  if(task.file) document.getElementById('filePreview').innerText = `📎 ${task.file.name}`;
  currentFile = task.file;

  // ganti tombol
  document.getElementById('btnSave').innerText = 'Update Tugas';
  document.getElementById('btnSave').classList.add('btn-save');
  document.getElementById('btnSave').onclick = updateTask;

  showPage('page-add', document.querySelectorAll('.nav-btn')[0]);
  showSpecialMessage('Mode Edit Aktif');
}

function updateTask() {
  if(selectedTaskIndex === null) return;
  const text = document.getElementById('taskInput').value.trim();
  if(text === '') return alert('Tulis judul tugas dulu dong');

  tasks[selectedTaskIndex] = {
  ...tasks[selectedTaskIndex],
    text,
    category: document.getElementById('categoryInput').value,
    note: document.getElementById('noteInput').value,
    startDate: document.getElementById('startDateInput').value,
    endDate: document.getElementById('endDateInput').value,
    time: document.getElementById('timeInput').value,
    file: currentFile
  };

  saveTasks(); renderTasks(); resetForm();
  isEditMode = false;
  const updatedIndex = selectedTaskIndex;
  selectedTaskIndex = null;
  document.getElementById('btnSave').innerText = 'Simpan Tugas';
  document.getElementById('btnSave').classList.remove('btn-save');
  document.getElementById('btnSave').onclick = addTask;
  showSaveMessage();

  // langsung buka detail lagi
  setTimeout(() => openDetail(updatedIndex), 500);
}

function deleteTask(index) {
  if(confirm('Yakin mau hapus tugas ini?')) {
    tasks.splice(index, 1);
    saveTasks(); renderTasks();
    selectedTaskIndex = null;
    document.getElementById('detailContent').innerHTML = '<p style="text-align:center; color:#94a3b8;">Tugas dihapus. Pilih tugas lain</p>';
    showSpecialMessage('Tugas dihapus');
    // balik ke halaman tambah
    showPage('page-add', document.querySelectorAll('.nav-btn')[0]);
  }
}

function toggleTaskFromDetail(index) {
  tasks[index].done =!tasks[index].done;
  if(tasks[index].done) tasks[index].completedAt = new Date().toISOString();
  else tasks[index].completedAt = null;
  saveTasks(); renderTasks(); openDetail(index);
}

function setTaskNotif(index) {
  const task = tasks[index];
  if(!task.endDate ||!task.time) return alert('Isi tanggal dan jam deadline dulu ya');

  const taskDateTime = new Date(task.endDate + 'T' + task.time);
  const notifTime = new Date(taskDateTime.getTime() - 30*60*1000);

  const now = new Date();
  const delay = notifTime.getTime() - now.getTime();

  if(delay < 0) return alert('Waktu notifikasi sudah lewat');

  setTimeout(() => {
    new Notification(`Pengingat: ${task.text}`, {
      body: `Deadline ${task.endDate} jam ${task.time}`
    });
  }, delay);

  showSpecialMessage(`Notifikasi diset! Akan bunyi 30 menit sebelum deadline`);
}

function addTask() {
  const text = document.getElementById('taskInput').value.trim();
  if(text === '') return alert('Tulis judul tugas dulu dong');
  const newTask = {
    text,
    category: document.getElementById('categoryInput').value,
    note: document.getElementById('noteInput').value,
    startDate: document.getElementById('startDateInput').value,
    endDate: document.getElementById('endDateInput').value,
    time: document.getElementById('timeInput').value,
    file: currentFile,
    done: false,
    completedAt: null,
    createdAt: new Date().toISOString()
  };
  tasks.push(newTask);
  const newIndex = tasks.length - 1;
  saveTasks(); renderTasks(); resetForm();
  showSaveMessage();

  // LANGSUNG BUKA DETAIL TUGAS BARU
  setTimeout(() => openDetail(newIndex), 500);
}

function resetForm() {
  document.getElementById('taskInput').value = '';
  document.getElementById('noteInput').value = '';
  document.getElementById('startDateInput').value = '';
  document.getElementById('endDateInput').value = '';
  document.getElementById('timeInput').value = '';
  document.getElementById('fileInput').value = '';
  document.getElementById('filePreview').innerText = '';
  currentFile = null;
}

function showPage(pageId, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  el.classList.add('active');

  if(pageId === 'page-add' &&!isEditMode) resetForm();
}
</script>

</body>
</html>
