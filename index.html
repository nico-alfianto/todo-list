<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do List</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
body { background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
.container { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
h1 { text-align: center; color: #1a1a1a; margin-bottom: 20px; }
.input-box { display: flex; gap: 10px; margin-bottom: 20px; }
input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
input:focus { border-color: #ffcc00; outline: none; }
.btn-add { background: #ffcc00; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
.btn-add:hover { background: #e6b800; }
.task-list { list-style: none; }
.task { display: flex; align-items: center; padding: 12px; margin-bottom: 10px; background: #fafafa; border-radius: 8px; border-left: 4px solid #ffcc00; }
.task.completed { opacity: 0.6; text-decoration: line-through; border-left-color: #4caf50; }
.task input[type="checkbox"] { width: 20px; height: 20px; margin-right: 12px; cursor: pointer; }
.task-text { flex: 1; word-break: break-word; }
.btn-delete { background: #e91e63; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.btn-delete:hover { background: #c2185b; }
.footer { text-align: center; margin-top: 20px; color: #666; font-size: 14px; }
</style>
</head>
<body>

<div class="container">
  <h1>To Do List</h1>

  <div class="input-box">
    <input type="text" id="taskInput" placeholder="Tambah tugas baru...">
    <button class="btn-add" onclick="addTask()">Tambah</button>
  </div>

  <ul class="task-list" id="taskList"></ul>

  <div class="footer">
    <span id="taskCount">0 tugas</span>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

function saveTasks() {
  localStorage.setItem('tasks', JSON.stringify(tasks));
}

function renderTasks() {
  const taskList = document.getElementById('taskList');
  taskList.innerHTML = '';

  tasks.forEach((task, index) => {
    const li = document.createElement('li');
    li.className = 'task' + (task.done? ' completed' : '');
    li.innerHTML = `
      <input type="checkbox" ${task.done? 'checked' : ''} onchange="toggleTask(${index})">
      <span class="task-text">${task.text}</span>
      <button class="btn-delete" onclick="deleteTask(${index})">Hapus</button>
    `;
    taskList.appendChild(li);
  });

  document.getElementById('taskCount').innerText = tasks.length + ' tugas';
}

function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if(text === '') return alert('Tugas tidak boleh kosong');

  tasks.push({ text: text, done: false });
  input.value = '';
  saveTasks();
  renderTasks();
}

function toggleTask(index) {
  tasks[index].done =!tasks[index].done;
  saveTasks();
  renderTasks();
}

function deleteTask(index) {
  if(confirm('Hapus tugas ini?')) {
    tasks.splice(index, 1);
    saveTasks();
    renderTasks();
  }
}

// Enter untuk tambah tugas
document.getElementById('taskInput').addEventListener('keypress', function(e) {
  if(e.key === 'Enter') addTask();
});

// load pertama kali
renderTasks();
</script>

</body>
</html>
